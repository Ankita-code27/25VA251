<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Var Data Values Types in JS</title>
</head>
<body>
    <script>
        var myName="Ankita";
        console.log(myName);
        console.log(typeof(myName));

        var myMob=8081593267;
        console.log(myName +" mobile number is "+myMob);

        var isMarried=false;
        console.log(myName + " is married ?" + isMarried);

        //Undefined
        var myEmail;
        console.log(myEmail);
        console.log(typeof(myEmail));

        //Null
        var myAddress=null;
        console.log(myAddress);
        console.log(typeof(myAddress));

        //Bigint
        var myValue=BigInt(898980946797690667769470);
        console.log(myValue);
        console.log(typeof(myValue));

        //Symbol
        var name1=Symbol("Ankita");
        var name2=Symbol("Ankita");
        console.log(name1=name2);

        //Objects are defined in pair of keys  

        let myInfo={
            name:"Ankita",
            age:23,
            isMarried:false,
            mob:8081593267,
            add:null,
            branch:"CSE",
            section:23,

        };

        console.log(myInfo);
        console.log(myInfo.name);


        //Function is block of code that perform specific task.

        function cal(){
            var num1=45;
            var num2=40;
            var res=num1+num2;
            console.log("Addition of two numbeers is "+ res);
            console.log(typeof(cal));
        }
        cal();

        //array is collection of any data datatypes in JS.

        //similar
        let AnkitaInfo=["Ankita Gupta" , 23 , false,null,"CSE",18];
        console.log(AnkitaInfo);

        //object length
        let keys= Object.keys(myInfo);
        console.log("myInfo object length " + keys.length); 

        //to iterate array number
        for(let i=0;i<AnkitaInfo.length;i++){
            console.log(AnkitaInfo[i]);
        }
        </script>
</body>
</html>
